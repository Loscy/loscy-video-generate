<!DOCTYPE html>
<html lang="zh-CN" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>分步生成小红书笔记 - 小红书笔记生成器</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        body {
            background: linear-gradient(135deg, #ff6b9d 0%, #c44569 100%);
            min-height: 100vh;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        .main-container {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            margin: 20px auto;
            padding: 30px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.1);
        }
        .form-control, .form-select {
            border-radius: 10px;
            border: 2px solid #e9ecef;
            padding: 12px 15px;
            transition: all 0.3s ease;
        }
        .form-control:focus, .form-select:focus {
            border-color: #ff6b9d;
            box-shadow: 0 0 0 0.2rem rgba(255, 107, 157, 0.25);
        }
        .btn-primary {
            background: linear-gradient(45deg, #ff6b9d, #c44569);
            border: none;
            border-radius: 10px;
            padding: 12px 30px;
            font-weight: 600;
            transition: all 0.3s ease;
        }
        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(255, 107, 157, 0.3);
        }
        .btn-success {
            background: linear-gradient(45deg, #28a745, #20c997);
            border: none;
            border-radius: 10px;
            padding: 12px 30px;
            font-weight: 600;
            transition: all 0.3s ease;
        }
        .btn-success:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(40, 167, 69, 0.3);
        }
        .btn-warning {
            background: linear-gradient(45deg, #ffc107, #fd7e14);
            border: none;
            border-radius: 10px;
            padding: 12px 30px;
            font-weight: 600;
            transition: all 0.3s ease;
        }
        .btn-warning:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(255, 193, 7, 0.3);
        }
        .progress {
            height: 10px;
            border-radius: 5px;
            background-color: #e9ecef;
        }
        .progress-bar {
            background: linear-gradient(45deg, #ff6b9d, #c44569);
            border-radius: 5px;
        }
        .status-card {
            background: #f8f9fa;
            border-radius: 15px;
            padding: 20px;
            margin: 20px 0;
            border-left: 5px solid #ff6b9d;
        }
        .script-preview {
            background: #f8f9fa;
            border-radius: 15px;
            padding: 20px;
            margin: 20px 0;
            border: 2px solid #e9ecef;
        }
        .key-point {
            background: rgba(255, 107, 157, 0.1);
            border-radius: 10px;
            padding: 15px;
            margin: 10px 0;
            border-left: 4px solid #ff6b9d;
            position: relative;
        }
        .key-point-editor {
            background: white;
            border-radius: 10px;
            padding: 15px;
            margin: 10px 0;
            border: 2px solid #e9ecef;
        }
        .key-point-editor:focus-within {
            border-color: #ff6b9d;
            box-shadow: 0 0 0 0.2rem rgba(255, 107, 157, 0.25);
        }
        .key-point-controls {
            position: absolute;
            top: 10px;
            right: 10px;
            display: flex;
            gap: 5px;
        }
        .btn-sm {
            padding: 5px 10px;
            font-size: 0.8rem;
            border-radius: 5px;
        }
        .btn-add-point {
            background: linear-gradient(45deg, #28a745, #20c997);
            border: none;
            color: white;
            margin: 10px 0;
        }
        .btn-add-point:hover {
            transform: translateY(-1px);
            box-shadow: 0 5px 10px rgba(40, 167, 69, 0.3);
        }
        .image-desc-editor {
            background: #f8f9fa;
            border-radius: 10px;
            padding: 15px;
            margin: 15px 0;
            border: 2px solid #e9ecef;
        }
        .image-desc-editor:focus-within {
            border-color: #ff6b9d;
            box-shadow: 0 0 0 0.2rem rgba(255, 107, 157, 0.25);
        }
        .step-indicator {
            display: flex;
            justify-content: center;
            margin: 30px 0;
        }
        .step {
            display: flex;
            align-items: center;
            margin: 0 20px;
        }
        .step-number {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: #e9ecef;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            margin-right: 10px;
        }
        .step.active .step-number {
            background: linear-gradient(45deg, #ff6b9d, #c44569);
            color: white;
        }
        .step.completed .step-number {
            background: linear-gradient(45deg, #28a745, #20c997);
            color: white;
        }
        .loading-spinner {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 3px solid #f3f3f3;
            border-top: 3px solid #ff6b9d;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        .feature-card {
            background: rgba(255, 255, 255, 0.1);
            border-radius: 15px;
            padding: 20px;
            margin: 15px 0;
            border: 1px solid rgba(255, 255, 255, 0.2);
            backdrop-filter: blur(5px);
        }
        .feature-card h5 {
            color: #333;
            margin-bottom: 10px;
        }
        .feature-card p {
            color: #666;
            margin-bottom: 0;
        }
        .alert {
            border-radius: 10px;
            border: none;
        }
        .editable-content {
            border: 2px dashed #dee2e6;
            border-radius: 10px;
            padding: 15px;
            margin: 10px 0;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .editable-content:hover {
            border-color: #ff6b9d;
            background-color: rgba(255, 107, 157, 0.05);
        }
        .editable-content.editing {
            border-color: #ff6b9d;
            background-color: rgba(255, 107, 157, 0.1);
        }
        
        /* 认证界面样式 */
        .auth-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.8);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 9999;
        }

        .auth-container {
            background: white;
            border-radius: 20px;
            padding: 40px;
            max-width: 400px;
            width: 90%;
            text-align: center;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.3);
        }

        .auth-container h3 {
            color: #ff6b9d;
            margin-bottom: 20px;
        }

        .auth-error {
            color: #dc3545;
            margin-top: 10px;
            font-size: 0.9rem;
        }

        #mainContent {
            display: none;
        }

        #mainContent.authenticated {
            display: block;
        }

        .logout-btn {
            background: rgba(255, 255, 255, 0.2);
            border: 1px solid rgba(255, 255, 255, 0.3);
            color: white;
            border-radius: 10px;
            padding: 8px 15px;
            font-size: 0.9rem;
            transition: all 0.3s ease;
        }

        .logout-btn:hover {
            background: rgba(255, 255, 255, 0.3);
            color: white;
        }
    </style>
</head>
<body>
    <!-- 密钥验证界面 -->
    <div id="authOverlay" class="auth-overlay">
        <div class="auth-container">
            <h3><i class="fas fa-lock me-2"></i>访问验证</h3>
            <p class="text-muted mb-4">请输入访问密钥以继续使用小红书笔记生成器</p>
            <div class="mb-3">
                <input type="password" class="form-control" id="accessKey" 
                       placeholder="请输入访问密钥" onkeypress="handleKeyPress(event)">
            </div>
            <button type="button" class="btn btn-primary" onclick="verifyAccess()">
                <i class="fas fa-unlock me-2"></i>验证并进入
            </button>
            <div id="authError" class="auth-error" style="display: none;"></div>
        </div>
    </div>

    <div id="mainContent">
    <!-- 导航栏 -->
    <nav class="navbar navbar-expand-lg" style="background: rgba(0,0,0,0.1);">
        <div class="container">
            <a class="navbar-brand text-white fw-bold" href="/">
                <i class="fas fa-magic me-2"></i>小红书笔记生成器
            </a>
            <div class="navbar-nav ms-auto">
                <a class="nav-link text-white" href="/xhs/generate">
                    <i class="fas fa-bolt me-1"></i>快速生成
                </a>
                <a class="nav-link text-white active" href="/xhs/generate-steps">
                    <i class="fas fa-list-ol me-1"></i>分步生成
                </a>
                <button class="btn logout-btn ms-2" onclick="logout()">
                    <i class="fas fa-sign-out-alt me-1"></i>退出
                </button>
            </div>
        </div>
    </nav>

    <div class="container">
        <div class="main-container">
            <!-- 页面标题 -->
            <div class="text-center mb-4">
                <h1 class="display-5 fw-bold text-primary mb-3">
                    <i class="fas fa-list-ol me-3"></i>分步生成小红书笔记
                </h1>
                <p class="lead text-muted">先生成文案内容，确认后再生成精美图片</p>
            </div>

            <!-- 步骤指示器 -->
            <div class="step-indicator">
                <div class="step active" id="step1">
                    <div class="step-number">1</div>
                    <span>生成文案</span>
                </div>
                <div class="step" id="step2">
                    <div class="step-number">2</div>
                    <span>生成图片</span>
                </div>
            </div>

            <!-- 步骤1: 输入内容和生成脚本 -->
            <div id="step1Content">
                <div class="row">
                    <div class="col-12">
                        <div class="mb-3">
                            <label for="contentInput" class="form-label">
                                <i class="fas fa-edit me-2"></i>请输入您想要生成笔记的内容
                            </label>
                            <textarea class="form-control" id="contentInput" rows="6"
                                      placeholder="例如：分享一些提高工作效率的小技巧。时间管理很重要，可以使用番茄工作法，每25分钟专注工作，然后休息5分钟。还要学会优先级排序，先做重要且紧急的事情。保持工作环境整洁也能提高效率..."></textarea>
                        </div>
                    </div>
                </div>

                <div class="text-center mb-4">
                    <button type="button" class="btn btn-primary btn-lg" onclick="generateScript()" id="generateScriptBtn">
                        <i class="fas fa-magic me-2"></i>生成文案脚本
                    </button>
                </div>
            </div>

            <!-- 脚本生成进度 -->
            <div id="scriptProgressSection" class="status-card" style="display: none;">
                <h5><i class="fas fa-cog fa-spin me-2"></i>生成文案进度</h5>
                <div class="progress mb-3">
                    <div class="progress-bar" id="scriptProgressBar" role="progressbar" style="width: 0%"></div>
                </div>
                <p id="scriptStatusMessage">正在准备生成文案...</p>
            </div>

            <!-- 脚本预览和编辑 -->
            <div id="scriptPreview" class="script-preview" style="display: none;">
                <h4><i class="fas fa-file-alt me-2"></i>生成的文案内容 <small class="text-muted">(可直接编辑)</small></h4>

                <div class="mb-3">
                    <label class="form-label fw-bold">标题:</label>
                    <input type="text" class="form-control" id="titleInput" placeholder="请输入标题">
                </div>

                <div class="mb-3">
                    <label class="form-label fw-bold">图片描述:</label>
                    <div class="image-desc-editor">
                        <textarea class="form-control" id="imageDescInput" rows="3" placeholder="请输入图片描述，用于生成封面图片"></textarea>
                    </div>
                </div>

                <div class="mb-3">
                    <label class="form-label fw-bold">核心要点:</label>
                    <div id="keyPointsList"></div>
                    <div class="text-center mt-3">
                        <button type="button" class="btn btn-add-point btn-sm me-2" onclick="addKeyPoint()">
                            <i class="fas fa-plus me-1"></i>添加要点
                        </button>
                        <button type="button" class="btn btn-outline-warning btn-sm me-2" onclick="resetKeyPoints()">
                            <i class="fas fa-undo me-1"></i>重置要点
                        </button>
                        <button type="button" class="btn btn-outline-info btn-sm" onclick="showKeyPointsCount()">
                            <i class="fas fa-info-circle me-1"></i>当前 <span id="keyPointsCount">0</span> 个要点
                        </button>
                    </div>
                </div>

                <div class="text-center mt-4">
                    <button type="button" class="btn btn-success btn-lg me-3" onclick="proceedToImages()" id="proceedBtn">
                        <i class="fas fa-arrow-right me-2"></i>确认内容，生成图片
                    </button>
                    <button type="button" class="btn btn-warning btn-lg" onclick="regenerateScript()" id="regenerateBtn">
                        <i class="fas fa-redo me-2"></i>重新生成文案
                    </button>
                </div>
            </div>

            <!-- 图片生成进度 -->
            <div id="imageProgressSection" class="status-card" style="display: none;">
                <h5><i class="fas fa-cog fa-spin me-2"></i>生成图片进度</h5>
                <div class="progress mb-3">
                    <div class="progress-bar" id="imageProgressBar" role="progressbar" style="width: 0%"></div>
                </div>
                <p id="imageStatusMessage">正在准备生成图片...</p>
            </div>

            <!-- 错误信息 -->
            <div id="errorMessage" class="alert alert-danger" style="display: none;">
                <i class="fas fa-exclamation-triangle me-2"></i>
                <span id="errorText"></span>
            </div>

            <!-- 成功信息 -->
            <div id="successMessage" class="alert alert-success" style="display: none;">
                <i class="fas fa-check-circle me-2"></i>
                <span id="successText"></span>
                <div class="mt-3">
                    <a id="viewResultLink" href="#" class="btn btn-success">
                        <i class="fas fa-eye me-2"></i>查看生成结果
                    </a>
                </div>
            </div>
        </div>
    </div>

    <!-- 页脚 -->
    <footer class="text-center text-white py-4 mt-5" style="background: rgba(0,0,0,0.3);">
        <div class="container">
            <span class="text-muted-foreground text-sm">
                &copy; 2025 小红书笔记生成器 All rights reserved.
            </span>
            <a href="https://beian.miit.gov.cn/" target="_blank" rel="noopener noreferrer" class="hover:underline ms-3">
                辽ICP备19012932号-4
            </a>
        </div>
    </footer>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        // 验证相关变量
        let isAuthenticated = false;
        let currentToken = null;
        let currentScript = null;
        let currentStep = 1;
        
        // 页面加载时检查验证状态
        document.addEventListener('DOMContentLoaded', function() {
            checkAuthStatus();
        });

        // 检查认证状态
        function checkAuthStatus() {
            const authStatus = localStorage.getItem('xhsGeneratorAuth');
            const savedToken = localStorage.getItem('xhsGeneratorToken');
            if (authStatus === 'true' && savedToken) {
                isAuthenticated = true;
                currentToken = savedToken;
                showMainContent();
            } else {
                showAuthOverlay();
            }
        }

        // 显示验证界面
        function showAuthOverlay() {
            document.getElementById('authOverlay').style.display = 'flex';
            document.getElementById('mainContent').classList.remove('authenticated');
            document.getElementById('accessKey').focus();
        }

        // 显示主内容
        function showMainContent() {
            document.getElementById('authOverlay').style.display = 'none';
            document.getElementById('mainContent').classList.add('authenticated');
        }

        // 验证访问密钥
        function verifyAccess() {
            const accessKey = document.getElementById('accessKey').value.trim();
            
            if (!accessKey) {
                showAuthError('请输入访问密钥');
                return;
            }

            // 发送验证请求
            fetch('/xhs/verify-access', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/x-www-form-urlencoded',
                },
                body: 'accessKey=' + encodeURIComponent(accessKey)
            })
            .then(response => response.json())
            .then(data => {
                if (data.success) {
                    isAuthenticated = true;
                    currentToken = data.token;
                    localStorage.setItem('xhsGeneratorAuth', 'true');
                    localStorage.setItem('xhsGeneratorToken', data.token);
                    showMainContent();
                    hideAuthError();
                } else {
                    showAuthError(data.message || '访问密钥错误');
                }
            })
            .catch(error => {
                showAuthError('网络请求失败: ' + error.message);
            });
        }

        // 显示认证错误
        function showAuthError(message) {
            document.getElementById('authError').textContent = message;
            document.getElementById('authError').style.display = 'block';
        }

        // 隐藏认证错误
        function hideAuthError() {
            document.getElementById('authError').style.display = 'none';
        }

        // 处理回车键
        function handleKeyPress(event) {
            if (event.key === 'Enter') {
                verifyAccess();
            }
        }

        // 退出登录
        function logout() {
            if (confirm('确定要退出吗？')) {
                isAuthenticated = false;
                currentToken = null;
                localStorage.removeItem('xhsGeneratorAuth');
                localStorage.removeItem('xhsGeneratorToken');
                showAuthOverlay();
            }
        }

        // 生成脚本函数
        function generateScript() {
            const content = document.getElementById('contentInput').value.trim();

            // 验证输入
            if (!content) {
                showError('请输入要生成笔记的内容');
                return;
            }

            if (content.length < 20) {
                showError('内容太短，请输入至少20个字符的内容');
                return;
            }

            // 隐藏之前的消息
            hideMessages();
            hideScriptPreview();

            // 显示进度
            showScriptProgress('正在分析内容...', 10);

            // 禁用按钮
            document.getElementById('generateScriptBtn').disabled = true;

            // 准备请求数据
            const requestData = {
                content: content
            };

            // 模拟进度更新
            const progressInterval = setInterval(() => {
                const currentProgress = parseInt(document.getElementById('scriptProgressBar').style.width) || 0;
                if (currentProgress < 80) {
                    const newProgress = currentProgress + Math.random() * 15;
                    const progress = Math.min(newProgress, 80);
                    let message = '正在生成文案...';
                    if (progress > 30) message = '正在分析核心要点...';
                    if (progress > 60) message = '正在优化内容结构...';
                    showScriptProgress(message, progress);
                }
            }, 1000);

            // 发送请求
            fetch('/xhs/generate-script', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                    'Authorization': 'Bearer ' + currentToken
                },
                body: JSON.stringify(requestData)
            })
            .then(response => response.json())
            .then(data => {
                clearInterval(progressInterval);
                document.getElementById('generateScriptBtn').disabled = false;

                if (data.success) {
                    showScriptProgress('文案生成完成！', 100);
                    currentScript = data.script;
                    setTimeout(() => {
                        hideScriptProgress();
                        showScriptPreview(data.script);
                        updateStepIndicator(1, 'completed');
                    }, 1000);
                } else {
                    hideScriptProgress();
                    showError(data.message || '文案生成失败，请重试');
                }
            })
            .catch(error => {
                clearInterval(progressInterval);
                document.getElementById('generateScriptBtn').disabled = false;
                hideScriptProgress();
                showError('网络请求失败: ' + error.message);
            });
        }

        // 显示脚本预览
        function showScriptPreview(script) {
            // 填充标题
            document.getElementById('titleInput').value = script.title;

            // 填充图片描述
            document.getElementById('imageDescInput').value = script.imageDescription || '';

            // 填充核心要点
            renderKeyPoints();

            document.getElementById('scriptPreview').style.display = 'block';
        }

        // 渲染核心要点列表
        function renderKeyPoints() {
            const keyPointsList = document.getElementById('keyPointsList');
            keyPointsList.innerHTML = '';

            // 更新要点计数
            updateKeyPointsCount();

            currentScript.keyPoints.forEach((point, index) => {
                const pointDiv = document.createElement('div');
                pointDiv.className = 'key-point-editor';
                pointDiv.innerHTML = `
                    <div class="key-point-controls">
                        <button type="button" class="btn btn-danger btn-sm" onclick="removeKeyPoint(${index})" title="删除要点">
                            <i class="fas fa-trash"></i>
                        </button>
                    </div>
                    <div class="mb-2">
                        <label class="form-label fw-bold">要点 ${index + 1}:</label>
                        <input type="text" class="form-control" value="${point}"
                               onchange="updateKeyPoint(${index}, this.value)" placeholder="请输入核心要点">
                    </div>
                    <div class="mb-3">
                        <label class="form-label fw-bold">详细描述:</label>
                        <textarea class="form-control" rows="3"
                                  onchange="updateKeyPointDescription(${index}, this.value)"
                                  placeholder="请输入详细描述">${currentScript.descriptions[index] || ''}</textarea>
                    </div>
                    <div class="text-end">
                        <button type="button" class="btn btn-outline-danger btn-sm" onclick="removeKeyPoint(${index})">
                            <i class="fas fa-trash me-1"></i>删除此要点
                        </button>
                    </div>
                `;
                keyPointsList.appendChild(pointDiv);
            });
        }

        // 隐藏脚本预览
        function hideScriptPreview() {
            document.getElementById('scriptPreview').style.display = 'none';
        }

        // 更新核心要点
        function updateKeyPoint(index, value) {
            currentScript.keyPoints[index] = value;
        }

        // 更新核心要点描述
        function updateKeyPointDescription(index, value) {
            if (!currentScript.descriptions) {
                currentScript.descriptions = [];
            }
            currentScript.descriptions[index] = value;
        }

        // 添加核心要点
        function addKeyPoint() {
            if (!currentScript.keyPoints) {
                currentScript.keyPoints = [];
            }
            if (!currentScript.descriptions) {
                currentScript.descriptions = [];
            }

            currentScript.keyPoints.push('新要点');
            currentScript.descriptions.push('');
            renderKeyPoints();
        }

        // 删除核心要点
        function removeKeyPoint(index) {
            if (currentScript.keyPoints.length <= 1) {
                showError('至少需要保留一个核心要点');
                return;
            }

            const pointTitle = currentScript.keyPoints[index];
            const confirmMessage = `确定要删除要点 "${pointTitle}" 吗？\n删除后将无法恢复。`;

            if (confirm(confirmMessage)) {
                currentScript.keyPoints.splice(index, 1);
                if (currentScript.descriptions) {
                    currentScript.descriptions.splice(index, 1);
                }
                renderKeyPoints();

                // 显示删除成功提示
                showSuccessMessage(`要点 "${pointTitle}" 已删除`);
            }
        }

        // 显示成功消息（临时）
        function showSuccessMessage(message) {
            const existingAlert = document.querySelector('.alert-success-temp');
            if (existingAlert) {
                existingAlert.remove();
            }

            const alertDiv = document.createElement('div');
            alertDiv.className = 'alert alert-success alert-success-temp';
            alertDiv.style.position = 'fixed';
            alertDiv.style.top = '20px';
            alertDiv.style.right = '20px';
            alertDiv.style.zIndex = '9999';
            alertDiv.style.minWidth = '300px';
            alertDiv.innerHTML = `
                <i class="fas fa-check-circle me-2"></i>${message}
            `;

            document.body.appendChild(alertDiv);

            // 3秒后自动消失
            setTimeout(() => {
                if (alertDiv.parentNode) {
                    alertDiv.remove();
                }
            }, 3000);
        }

        // 更新要点计数
        function updateKeyPointsCount() {
            const countElement = document.getElementById('keyPointsCount');
            if (countElement && currentScript && currentScript.keyPoints) {
                countElement.textContent = currentScript.keyPoints.length;
            }
        }

        // 重置要点到默认状态
        function resetKeyPoints() {
            if (confirm('确定要重置所有要点吗？这将清除所有自定义内容。')) {
                currentScript.keyPoints = ['新要点1', '新要点2', '新要点3', '新要点4'];
                currentScript.descriptions = ['', '', '', ''];
                renderKeyPoints();
                showSuccessMessage('要点已重置为默认状态');
            }
        }

        // 显示要点统计信息
        function showKeyPointsCount() {
            const count = currentScript.keyPoints ? currentScript.keyPoints.length : 0;
            const filledCount = currentScript.descriptions ?
                currentScript.descriptions.filter(desc => desc && desc.trim() !== '').length : 0;

            alert(`要点统计信息：\n总要点数：${count}\n已填写描述：${filledCount}\n未填写描述：${count - filledCount}`);
        }

        // 重新生成脚本
        function regenerateScript() {
            generateScript();
        }

        // 收集编辑后的数据
        function collectEditedData() {
            // 更新标题
            const titleInput = document.getElementById('titleInput');
            if (titleInput) {
                currentScript.title = titleInput.value.trim();
            }

            // 更新图片描述
            const imageDescInput = document.getElementById('imageDescInput');
            if (imageDescInput) {
                currentScript.imageDescription = imageDescInput.value.trim();
            }

            // 核心要点和描述已经通过onchange事件实时更新了
            console.log('收集到的编辑数据:', currentScript);
        }

        // 进入图片生成步骤
        function proceedToImages() {
            if (!currentScript) {
                showError('没有可用的脚本');
                return;
            }

            // 收集编辑后的数据
            collectEditedData();

            // 更新步骤指示器
            updateStepIndicator(2, 'active');

            // 隐藏脚本预览
            hideScriptPreview();
            hideMessages();

            // 显示图片生成进度
            showImageProgress('正在准备图片生成...', 10);

            // 模拟进度更新
            const progressInterval = setInterval(() => {
                const currentProgress = parseInt(document.getElementById('imageProgressBar').style.width) || 0;
                if (currentProgress < 80) {
                    const newProgress = currentProgress + Math.random() * 15;
                    const progress = Math.min(newProgress, 80);
                    let message = '正在生成图片...';
                    if (progress > 30) message = '正在生成封面图...';
                    if (progress > 60) message = '正在生成内容图...';
                    showImageProgress(message, progress);
                }
            }, 800);

            // 发送请求
            fetch('/xhs/generate-images', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                    'Authorization': 'Bearer ' + currentToken
                },
                body: JSON.stringify(currentScript)
            })
            .then(response => response.json())
            .then(data => {
                clearInterval(progressInterval);

                if (data.success) {
                    showImageProgress('图片生成完成！', 100);
                    setTimeout(() => {
                        hideImageProgress();
                        updateStepIndicator(2, 'completed');
                        showSuccess('小红书笔记生成成功！', data.taskId);
                    }, 1000);
                } else {
                    hideImageProgress();
                    showError(data.message || '图片生成失败，请重试');
                }
            })
            .catch(error => {
                clearInterval(progressInterval);
                hideImageProgress();
                showError('网络请求失败: ' + error.message);
            });
        }

        // 更新步骤指示器
        function updateStepIndicator(step, status) {
            const stepElement = document.getElementById('step' + step);
            stepElement.className = 'step ' + status;
        }

        // 显示脚本生成进度
        function showScriptProgress(message, progress) {
            document.getElementById('scriptProgressSection').style.display = 'block';
            document.getElementById('scriptStatusMessage').textContent = message;
            document.getElementById('scriptProgressBar').style.width = progress + '%';
        }

        // 隐藏脚本生成进度
        function hideScriptProgress() {
            document.getElementById('scriptProgressSection').style.display = 'none';
            document.getElementById('scriptProgressBar').style.width = '0%';
        }

        // 显示图片生成进度
        function showImageProgress(message, progress) {
            document.getElementById('imageProgressSection').style.display = 'block';
            document.getElementById('imageStatusMessage').textContent = message;
            document.getElementById('imageProgressBar').style.width = progress + '%';
        }

        // 隐藏图片生成进度
        function hideImageProgress() {
            document.getElementById('imageProgressSection').style.display = 'none';
            document.getElementById('imageProgressBar').style.width = '0%';
        }

        // 显示错误
        function showError(message) {
            document.getElementById('errorMessage').style.display = 'block';
            document.getElementById('errorText').textContent = message;
        }

        // 显示成功
        function showSuccess(message, taskId) {
            document.getElementById('successMessage').style.display = 'block';
            document.getElementById('successText').textContent = message;
            document.getElementById('viewResultLink').href = '/xhs/result/' + taskId;
        }

        // 隐藏所有消息
        function hideMessages() {
            document.getElementById('errorMessage').style.display = 'none';
            document.getElementById('successMessage').style.display = 'none';
        }
    </script>
</body>
</html>
