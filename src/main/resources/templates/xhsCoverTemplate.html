<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <style>
        .clue-wrap {
            background-color: #fff;
            padding: 40px;
        }
        .clue-title {
            font-size: 78px;
            line-height: 100px;
            font-weight: 800;
            border-bottom: 2px solid #000;
            display: inline-block;
            margin-bottom: 20px;
        }
        .clue-desc {
            font-size: 32px;
            margin-bottom: 40px;
        }
        .clue-airplane-icon {
            width: 130px;
            height: 100px;
        }
        .clue-ship-img {
            width: 100%;
            aspect-ratio: 3/2;
            object-fit: cover;
            border-radius: 16px;
            margin-bottom: 10px;
        }
    </style>
</head>
<body>
<div class="clue-wrap">
    <div class="clue-title">
        <img class="clue-airplane-icon" src="/images/airplan.png" alt="airplane" align="right" />
        ${mainTitle}
    </div>
    <div class="clue-desc">${points}</div>
    <img class="clue-ship-img" src="${url}" alt="${mainTitle}">
</div>
</body>
</html>
