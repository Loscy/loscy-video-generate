<!DOCTYPE html>
<html lang="zh-CN" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>小红书笔记生成器</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        body {
            background: linear-gradient(135deg, #ff6b9d 0%, #c44569 100%);
            min-height: 100vh;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        .main-container {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            margin: 20px auto;
            padding: 30px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.1);
        }

        .form-control, .form-select {
            border-radius: 10px;
            border: 2px solid #e9ecef;
            padding: 12px 15px;
            transition: all 0.3s ease;
        }

        .form-control:focus, .form-select:focus {
            border-color: #ff6b9d;
            box-shadow: 0 0 0 0.2rem rgba(255, 107, 157, 0.25);
        }

        .btn-primary {
            background: linear-gradient(45deg, #ff6b9d, #c44569);
            border: none;
            border-radius: 10px;
            padding: 12px 30px;
            font-weight: 600;
            transition: all 0.3s ease;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(255, 107, 157, 0.3);
        }

        .btn-success {
            background: linear-gradient(45deg, #28a745, #20c997);
            border: none;
            border-radius: 10px;
            padding: 12px 30px;
            font-weight: 600;
            transition: all 0.3s ease;
        }

        .btn-success:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(40, 167, 69, 0.3);
        }

        .progress {
            height: 10px;
            border-radius: 5px;
            background-color: #e9ecef;
        }

        .progress-bar {
            background: linear-gradient(45deg, #ff6b9d, #c44569);
            border-radius: 5px;
        }

        .status-card {
            background: #f8f9fa;
            border-radius: 15px;
            padding: 20px;
            margin: 20px 0;
            border-left: 5px solid #ff6b9d;
        }

        .loading-spinner {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 3px solid #f3f3f3;
            border-top: 3px solid #ff6b9d;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .feature-card {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 15px;
            padding: 20px;
            margin: 15px 0;
            text-align: center;
            transition: transform 0.3s ease;
            color: white;
        }

        .feature-card:hover {
            transform: translateY(-5px);
        }

        .feature-icon {
            font-size: 2rem;
            margin-bottom: 15px;
            color: #ffd700;
        }

        .hero-section {
            padding: 40px 0;
            text-align: center;
            color: white;
        }

        .hero-title {
            font-size: 2.5rem;
            font-weight: bold;
            margin-bottom: 15px;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.3);
        }

        .hero-subtitle {
            font-size: 1.1rem;
            margin-bottom: 30px;
            opacity: 0.9;
        }

        /* 认证界面样式 */
        .auth-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.8);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 9999;
        }

        .auth-container {
            background: white;
            border-radius: 20px;
            padding: 40px;
            max-width: 400px;
            width: 90%;
            text-align: center;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.3);
        }

        .auth-container h3 {
            color: #ff6b9d;
            margin-bottom: 20px;
        }

        .auth-error {
            color: #dc3545;
            margin-top: 10px;
            font-size: 0.9rem;
        }

        #mainContent {
            display: none;
        }

        #mainContent.authenticated {
            display: block;
        }

        .logout-btn {
            background: rgba(255, 255, 255, 0.2);
            border: 1px solid rgba(255, 255, 255, 0.3);
            color: white;
            border-radius: 10px;
            padding: 8px 15px;
            font-size: 0.9rem;
            transition: all 0.3s ease;
        }

        .logout-btn:hover {
            background: rgba(255, 255, 255, 0.3);
            color: white;
        }
    </style>
</head>
<body>
    <!-- 密钥验证界面 -->
    <div id="authOverlay" class="auth-overlay">
        <div class="auth-container">
            <h3><i class="fas fa-lock me-2"></i>访问验证</h3>
            <p class="text-muted mb-4">请输入访问密钥以继续使用小红书笔记生成器</p>
            <div class="mb-3">
                <input type="password" class="form-control" id="accessKey" 
                       placeholder="请输入访问密钥" onkeypress="handleKeyPress(event)">
            </div>
            <button type="button" class="btn btn-primary" onclick="verifyAccess()">
                <i class="fas fa-unlock me-2"></i>验证并进入
            </button>
            <div id="authError" class="auth-error" style="display: none;"></div>
        </div>
    </div>

    <div id="mainContent">
    <!-- 导航栏 -->
    <nav class="navbar navbar-expand-lg navbar-dark" style="background: rgba(0,0,0,0.2); backdrop-filter: blur(10px);">
        <div class="container">
            <a class="navbar-brand" href="/">
                <i class="fas fa-heart me-2"></i>小红书笔记生成器
            </a>
            <div class="navbar-nav ms-auto">
                <a class="nav-link active" href="/xhs/generate">
                    <i class="fas fa-bolt me-1"></i>快速生成
                </a>
                <a class="nav-link" href="/xhs/generate-steps">
                    <i class="fas fa-list-ol me-1"></i>分步生成
                </a>
                <a class="nav-link" href="/">
                    <i class="fas fa-home me-1"></i>首页
                </a>
                <button class="btn logout-btn ms-2" onclick="logout()">
                    <i class="fas fa-sign-out-alt me-1"></i>退出
                </button>
            </div>
        </div>
    </nav>

    <div class="container">
        <!-- 英雄区域 -->
        <div class="hero-section">
            <h1 class="hero-title">小红书笔记生成器</h1>
            <p class="hero-subtitle">AI智能生成小红书风格笔记，一键生成标题、要点和精美图片</p>
        </div>

        <!-- 功能介绍 -->
        <div class="row mb-4">
            <div class="col-md-4">
                <div class="feature-card">
                    <div class="feature-icon">
                        <i class="fas fa-brain"></i>
                    </div>
                    <h5>AI智能分析</h5>
                    <p>使用DeepSeek AI分析内容，生成吸引人的标题和核心要点</p>
                </div>
            </div>
            <div class="col-md-4">
                <div class="feature-card">
                    <div class="feature-icon">
                        <i class="fas fa-image"></i>
                    </div>
                    <h5>智能配图</h5>
                    <p>自动生成小红书风格的封面图和内容图片</p>
                </div>
            </div>
            <div class="col-md-4">
                <div class="feature-card">
                    <div class="feature-icon">
                        <i class="fas fa-download"></i>
                    </div>
                    <h5>一键下载</h5>
                    <p>生成的HTML可直接下载为图片，方便分享</p>
                </div>
            </div>
        </div>

        <!-- 主要内容区域 -->
        <div class="main-container">
            <h2 class="text-center mb-4">
                <i class="fas fa-magic me-2"></i>开始生成小红书笔记
            </h2>

            <!-- 输入表单 -->
            <div class="row">
                <div class="col-12">
                    <div class="mb-3">
                        <label for="contentInput" class="form-label">
                            <i class="fas fa-edit me-2"></i>请输入您想要生成笔记的内容
                        </label>
                        <textarea class="form-control" id="contentInput" rows="6"
                                  placeholder="例如：分享一些提高工作效率的小技巧。时间管理很重要，可以使用番茄工作法，每25分钟专注工作，然后休息5分钟。还要学会优先级排序，先做重要且紧急的事情。保持工作环境整洁也能提高效率..."></textarea>
                    </div>
                </div>
            </div>



            <!-- 生成按钮 -->
            <div class="text-center mb-4">
                <button type="button" class="btn btn-primary btn-lg" onclick="generateNote()" id="generateBtn">
                    <i class="fas fa-magic me-2"></i>开始生成笔记
                </button>
            </div>

            <!-- 生成进度 -->
            <div id="progressSection" class="status-card" style="display: none;">
                <h5><i class="fas fa-cog fa-spin me-2"></i>生成进度</h5>
                <div class="progress mb-3">
                    <div class="progress-bar" id="progressBar" role="progressbar" style="width: 0%"></div>
                </div>
                <p id="statusMessage">正在准备生成...</p>
            </div>

            <!-- 错误信息 -->
            <div id="errorMessage" class="alert alert-danger" style="display: none;">
                <i class="fas fa-exclamation-triangle me-2"></i>
                <span id="errorText"></span>
            </div>

            <!-- 成功信息 -->
            <div id="successMessage" class="alert alert-success" style="display: none;">
                <i class="fas fa-check-circle me-2"></i>
                <span id="successText"></span>
                <div class="mt-3">
                    <a id="viewResultLink" href="#" class="btn btn-success">
                        <i class="fas fa-eye me-2"></i>查看生成结果
                    </a>
                </div>
            </div>
        </div>
    </div>

    <!-- 页脚 -->
    <footer class="text-center text-white py-4 mt-5" style="background: rgba(0,0,0,0.3);">
        <div class="container">
            <span class="text-muted-foreground text-sm">
                &copy; 2025 小红书笔记生成器 All rights reserved.
            </span>
            <a href="https://beian.miit.gov.cn/" target="_blank" rel="noopener noreferrer" class="hover:underline ms-3">
                辽ICP备19012932号-4
            </a>
        </div>
    </footer>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        // 验证相关变量
        let isAuthenticated = false;
        let currentToken = null;
        
        // 页面加载时检查验证状态
        document.addEventListener('DOMContentLoaded', function() {
            checkAuthStatus();
        });

        // 检查认证状态
        function checkAuthStatus() {
            const authStatus = localStorage.getItem('xhsGeneratorAuth');
            const savedToken = localStorage.getItem('xhsGeneratorToken');
            if (authStatus === 'true' && savedToken) {
                isAuthenticated = true;
                currentToken = savedToken;
                showMainContent();
            } else {
                showAuthOverlay();
            }
        }

        // 显示验证界面
        function showAuthOverlay() {
            document.getElementById('authOverlay').style.display = 'flex';
            document.getElementById('mainContent').classList.remove('authenticated');
            document.getElementById('accessKey').focus();
        }

        // 显示主内容
        function showMainContent() {
            document.getElementById('authOverlay').style.display = 'none';
            document.getElementById('mainContent').classList.add('authenticated');
        }

        // 验证访问密钥
        function verifyAccess() {
            const accessKey = document.getElementById('accessKey').value.trim();
            
            if (!accessKey) {
                showAuthError('请输入访问密钥');
                return;
            }

            // 发送验证请求
            fetch('/xhs/verify-access', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/x-www-form-urlencoded',
                },
                body: 'accessKey=' + encodeURIComponent(accessKey)
            })
            .then(response => response.json())
            .then(data => {
                if (data.success) {
                    isAuthenticated = true;
                    currentToken = data.token;
                    localStorage.setItem('xhsGeneratorAuth', 'true');
                    localStorage.setItem('xhsGeneratorToken', data.token);
                    showMainContent();
                    hideAuthError();
                } else {
                    showAuthError(data.message || '访问密钥错误');
                }
            })
            .catch(error => {
                showAuthError('网络请求失败: ' + error.message);
            });
        }

        // 显示认证错误
        function showAuthError(message) {
            document.getElementById('authError').textContent = message;
            document.getElementById('authError').style.display = 'block';
        }

        // 隐藏认证错误
        function hideAuthError() {
            document.getElementById('authError').style.display = 'none';
        }

        // 处理回车键
        function handleKeyPress(event) {
            if (event.key === 'Enter') {
                verifyAccess();
            }
        }

        // 退出登录
        function logout() {
            if (confirm('确定要退出吗？')) {
                isAuthenticated = false;
                currentToken = null;
                localStorage.removeItem('xhsGeneratorAuth');
                localStorage.removeItem('xhsGeneratorToken');
                showAuthOverlay();
            }
        }

        // 生成笔记函数
        function generateNote() {
            const content = document.getElementById('contentInput').value.trim();

            // 验证输入
            if (!content) {
                showError('请输入要生成笔记的内容');
                return;
            }

            if (content.length < 20) {
                showError('内容太短，请输入至少20个字符的内容');
                return;
            }

            // 隐藏之前的消息
            hideMessages();

            // 显示进度
            showProgress('正在分析内容...', 10);

            // 禁用按钮
            document.getElementById('generateBtn').disabled = true;

            // 准备请求数据
            const requestData = {
                content: content
            };

            // 模拟进度更新
            const progressInterval = setInterval(() => {
                const currentProgress = parseInt(document.getElementById('progressBar').style.width) || 0;
                if (currentProgress < 80) {
                    const newProgress = currentProgress + Math.random() * 15;
                    const progress = Math.min(newProgress, 80);
                    let message = '正在生成内容...';
                    if (progress > 30) message = '正在生成图片...';
                    if (progress > 60) message = '正在优化结果...';
                    showProgress(message, progress);
                }
            }, 1000);

            // 发送请求
            fetch('/xhs/generate', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                    'Authorization': 'Bearer ' + currentToken
                },
                body: JSON.stringify(requestData)
            })
            .then(response => response.json())
            .then(data => {
                clearInterval(progressInterval);
                document.getElementById('generateBtn').disabled = false;

                if (data.success) {
                    showProgress('生成完成！', 100);
                    setTimeout(() => {
                        hideProgress();
                        showSuccess('笔记生成成功！', data.taskId);
                    }, 1000);
                } else {
                    hideProgress();
                    showError(data.message || '生成失败，请重试');
                }
            })
            .catch(error => {
                clearInterval(progressInterval);
                document.getElementById('generateBtn').disabled = false;
                hideProgress();
                showError('网络请求失败: ' + error.message);
            });
        }

        // 显示进度
        function showProgress(message, progress) {
            document.getElementById('progressSection').style.display = 'block';
            document.getElementById('statusMessage').textContent = message;
            document.getElementById('progressBar').style.width = progress + '%';
        }

        // 隐藏进度
        function hideProgress() {
            document.getElementById('progressSection').style.display = 'none';
            document.getElementById('progressBar').style.width = '0%';
        }

        // 显示错误
        function showError(message) {
            document.getElementById('errorMessage').style.display = 'block';
            document.getElementById('errorText').textContent = message;
        }

        // 显示成功
        function showSuccess(message, taskId) {
            document.getElementById('successMessage').style.display = 'block';
            document.getElementById('successText').textContent = message;
            document.getElementById('viewResultLink').href = '/xhs/result/' + taskId;
        }

        // 隐藏所有消息
        function hideMessages() {
            document.getElementById('errorMessage').style.display = 'none';
            document.getElementById('successMessage').style.display = 'none';
        }
    </script>
</body>
</html>
